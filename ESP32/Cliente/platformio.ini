; ============================================================
; Heltec Wireless Tracker V1.1 — ESP32-S3 + SX1262 + ST7735 TFT 160x80
; Cliente LoRaWAN — modo bajo consumo con light sleep
; ============================================================

[env:heltec_wifi_lora_32_V3]
platform  = espressif32
board     = heltec_wifi_lora_32_V3
framework = arduino

upload_port  = /dev/ttyACM0
monitor_port = /dev/ttyACM0

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

upload_speed = 921600

; Pre-upload: 1200-baud touch para que el firmware Arduino resetee al bootloader ROM
extra_scripts = pre:pre_upload.py

; Después del touch el device ya está en bootloader — no resetear de nuevo
board_upload.resetmethod = no_reset

lib_deps =
    jgromes/RadioLib       @ ^6.6.0
    bodmer/TFT_eSPI        @ ^2.5.43
    bblanchon/ArduinoJson  @ ^6.21.5

; ── URL del servidor ─────────────────────────────────────────────────────────
; Para lab local:   -DSERVER_DEFAULT_URL='"http://10.1.1.100:8000"'
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSERVER_DEFAULT_URL='"https://campo.exalink.com.ar"'
    -DCORE_DEBUG_LEVEL=0
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160
    -DTFT_MOSI=42
    -DTFT_SCLK=41
    -DTFT_CS=38
    -DTFT_DC=40
    -DTFT_RST=39
    -DLOAD_GLCD=1
    -DUSE_FSPI_PORT
    -DSPI_FREQUENCY=8000000
    -DSPI_READ_FREQUENCY=4000000

board_build.partitions = default_8MB.csv
board_build.f_cpu = 80000000L
