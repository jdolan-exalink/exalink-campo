; ============================================================
; Heltec Wireless Tracker V1.1 — ESP32-S3 + SX1262 + ST7735 TFT 160x80
; PlatformIO project configuration
; ============================================================

[env:heltec_wifi_lora_32_V3]
platform  = espressif32
board     = heltec_wifi_lora_32_V3
framework = arduino

; Puerto USB nativo ESP32-S3 (aparece como ttyACM0, no ttyUSB0)
upload_port  = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; Serial monitor
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

; Upload speed (ACM no usa baud rate real, pero esptool lo requiere)
upload_speed = 921600

; Libraries
lib_deps =
    jgromes/RadioLib       @ ^6.6.0
    bblanchon/ArduinoJson  @ ^6.21.5
    bodmer/TFT_eSPI        @ ^2.5.43

; ── URL del servidor ─────────────────────────────────────────────────────────
; Cambiar aquí para apuntar a prod (dominio) o lab (IP).
; El dispositivo lo persiste en NVS tras el primer boot; se puede cambiar
; luego desde el portal web sin reflashear.
; Para lab local:   -DSERVER_DEFAULT_URL='"http://10.1.1.100:8000"'
server_url = https://campo.exalink.com.ar

; Build flags
; ARDUINO_USB_CDC_ON_BOOT=1 → Serial via USB nativo (ttyACM0)
; USER_SETUP_LOADED=1       → TFT_eSPI usa SOLO estas defines, ignora User_Setup.h
; ST7735_DRIVER             → chip del display
; TFT usa FSPI/SPI2 pines 41/42 — LoRa usa HSPI/SPI3 pines 9/10/11 con begin() explícito
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSERVER_DEFAULT_URL='"https://campo.exalink.com.ar"'
    -DCORE_DEBUG_LEVEL=3
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160
    -DTFT_MOSI=42
    -DTFT_SCLK=41
    -DTFT_CS=38
    -DTFT_DC=40
    -DTFT_RST=39
    -DLOAD_GLCD=1
    ; USE_FSPI_PORT → SPI_PORT=2 (IDF idx para SPI2) → REG_SPI_BASE(2)=0x60024000 VÁLIDO
    ; Sin esta flag, SPI_PORT=FSPI=0 y REG_SPI_BASE(0)=0 → crash en SET_BUS_WRITE_MODE
    -DUSE_FSPI_PORT
    ; LoRa usa HSPI (SPI3, Arduino idx 1) con begin() explícito en lora_manager.cpp
    ; 8 MHz: seguro para GPIO matrix en pines no nativos (nativos S3: SCK=12, MOSI=11)
    -DSPI_FREQUENCY=8000000
    -DSPI_READ_FREQUENCY=4000000

; Partition table para 8 MB de flash
board_build.partitions = default_8MB.csv
